<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K3 - El lugar de los bichos</title>
    <meta
      name="description"
      content="Actividad interactiva para niños: arrastra los bichos para que las dos imágenes sean iguales."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- ENCABEZADO -->
    <header class="top-bar">
      <img
        src="img/logo_compartir.png"
        alt="Compartir"
        class="logo-compartir"
      />
    </header>

    <!-- JUEGO -->
    <main class="game">
      <!-- Cuadrículas: referencia (izquierda) + destino (derecha) -->
      <section class="game__grids">
        <div class="grid grid--reference">
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
              alt="Catarina"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
              alt="Gusano"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>

          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
              alt="Abeja"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>

          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
              alt="Mariposa"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
              alt="Hormiga"
              draggable="false"
            />
          </div>

          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
              alt="Libélula"
              draggable="false"
            />
          </div>
        </div>

        <!-- Zona de destino: el alumno suelta los bichos aquí -->
        <div class="grid grid--empty">
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
        </div>
      </section>

      <!-- Banco de bichos arrastrables -->
      <section class="bug-bank">
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
          alt="Catarina"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
          alt="Abeja"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
          alt="Gusano"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
          alt="Mariposa"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
          alt="Hormiga"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
          alt="Libélula"
          draggable="false"
        />
      </section>

      <!-- Personaje guía con globo de diálogo -->
      <aside class="guide">
        <div class="guide__bubble">
          <img
            src="img/globo.png"
            alt="Globo de texto"
            class="guide__bubble-img"
          />
          <p class="guide__text">
            Arrastra a los bichos para que las dos imágenes sean iguales.
          </p>
        </div>
        <figure class="guide__character">
          <img
            src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_19_2.png"
            alt="Personaje guía"
          />
        </figure>
      </aside>

      <!-- NUEVOS CONTROLES -->
      <nav class="bottom-nav" aria-label="Navegación">
        <a href="../../k3_menu.html" class="nav-circle">
          <img src="img/home.png" alt="Inicio" />
        </a>
        <a href="index.html" class="nav-circle">
          <img src="img/back.png" alt="Regreso" />
        </a>
        <div class="nav-circle">
          <img src="img/audio.png" alt="Audio" onclick="playIntro()" />
        </div>
      </nav>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
