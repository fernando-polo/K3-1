<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K3 - El lugar de los bichos</title>
    <meta
      name="description"
      content="Actividad interactiva para niños: arrastra los bichos para que las dos imágenes sean iguales."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- ENCABEZADO -->
    <header class="header">
      <div class="header__logo">
        <img src="img/logo_compartir.png" alt="Logo Compartir" />
      </div>
    </header>

    <!-- JUEGO -->
    <main class="game">
      <!-- Cuadrículas: referencia (izquierda) + destino (derecha) -->
      <section class="game__grids">
        <div class="grid grid--reference">
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
              alt="Catarina"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
              alt="Gusano"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>

          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
              alt="Abeja"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>

          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
              alt="Mariposa"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
              alt="Hormiga"
              draggable="false"
            />
          </div>

          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
              alt="Libélula"
              draggable="false"
            />
          </div>
        </div>

        <!-- Zona de destino: el alumno suelta los bichos aquí -->
        <div class="grid grid--empty">
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
        </div>
      </section>

      <!-- Banco de bichos arrastrables -->
      <section class="bug-bank">
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
          alt="Catarina"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
          alt="Abeja"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
          alt="Gusano"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
          alt="Mariposa"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
          alt="Hormiga"
          draggable="false"
        />
        <img
          class="bug-bank__bug"
          src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
          alt="Libélula"
          draggable="false"
        />
      </section>

      <!-- Personaje guía con globo de diálogo -->
      <aside class="guide">
        <div class="guide__bubble">
          <img
            src="img/globo.png"
            alt="Globo de texto"
            class="guide__bubble-img"
          />
          <p class="guide__text">
            Arrastra a los bichos para que las dos imágenes sean iguales.
          </p>
        </div>
        <figure class="guide__character">
          <img
            src="img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_19_2.png"
            alt="Personaje guía"
          />
        </figure>
      </aside>

      <!-- Botones de control: ahora un único set, siempre visible.
           Antes había uno duplicado en el footer para mobile/tablet;
           como el juego solo corre en horizontal (igual que el
           proyecto de referencia), ya no hace falta esa duplicación. -->
      <div class="game__controls">
        <a
          href="../../k3_menu.html"
          class="controls__btn controls__btn--home"
          aria-label="Ir al inicio"
        >
          <img
            class="controls__icon"
            src="img/home.png"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a
          href="index.html"
          class="controls__btn controls__btn--back"
          aria-label="Regresar"
        >
          <img
            class="controls__icon"
            src="img/back.png"
            alt=""
            aria-hidden="true"
          />
        </a>
        <button
          class="controls__btn controls__btn--audio"
          aria-label="Reproducir audio"
        >
          <img
            class="controls__icon"
            src="img/audio.png"
            alt=""
            aria-hidden="true"
          />
        </button>
      </div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
