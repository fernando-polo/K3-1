<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K3 - El lugar de los bichos</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Actividad interactiva para niños: arrastra los bichos para que las dos imágenes sean iguales."
    />
    <meta name="robots" content="noindex, nofollow" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- ==============================
         ENCABEZADO: logo
    ============================== -->
    <header class="header">
      <div class="header__logo">
        <img src="../img/logo_compartir.png" alt="Logo Compartir" />
      </div>
    </header>

    <!-- ==============================
         JUEGO: área principal
    ============================== -->
    <main class="game">
      <!-- Cuadrículas: referencia + destino -->
      <section class="game__grids">
        <!-- Cuadrícula de referencia (con bichos fijos) -->
        <div class="grid grid--reference">
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
              alt="Catarina"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
              alt="Gusano"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
              alt="Abeja"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
              alt="Mariposa"
              draggable="false"
            />
          </div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
              alt="Hormiga"
              draggable="false"
            />
          </div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell">
            <img
              class="grid__bug"
              src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
              alt="Libélula"
              draggable="false"
            />
          </div>
        </div>

        <!-- Cuadrícula vacía (zona de destino para soltar bichos) -->
        <div class="grid grid--empty">
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
          <div class="grid__cell"></div>
        </div>
      </section>

      <!-- Banco de bichos arrastrables -->
      <section class="bug-bank">
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_37_7.png"
          alt="Catarina"
          draggable="true"
        />
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_38_7.png"
          alt="Abeja"
          draggable="true"
        />
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_39_7.png"
          alt="Gusano"
          draggable="true"
        />
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_40_7.png"
          alt="Mariposa"
          draggable="true"
        />
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_41_7.png"
          alt="Hormiga"
          draggable="true"
        />
        <img
          class="bug-bank__bug"
          src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_42_7.png"
          alt="Libélula"
          draggable="true"
        />
      </section>

      <!-- Personaje guía con globo de diálogo -->
      <aside class="guide">
        <div class="guide__bubble">
          <img
            src="../img/globo.png"
            alt="Globo de texto"
            class="guide__bubble-img"
          />
          <p class="guide__text">
            Arrastra a los bichos para que las dos imágenes sean iguales.
          </p>
        </div>
        <figure class="guide__character">
          <img
            src="../img/C26_As_2_0_T1_K3_MAT_HTML_BC_PRIN_19_2.png"
            alt="Personaje guía"
          />
        </figure>
      </aside>

      <!-- Botones de control (visibles solo en desktop, viven dentro del grid) -->
      <div class="game__controls">
        <button
          class="controls__btn controls__btn--home"
          aria-label="Ir al inicio"
        >
          <img
            class="controls__icon"
            src="img/home.png"
            alt=""
            aria-hidden="true"
          />
        </button>
        <button class="controls__btn controls__btn--back" aria-label="Regresar">
          <img
            class="controls__icon"
            src="img/back.png"
            alt=""
            aria-hidden="true"
          />
        </button>
        <button
          class="controls__btn controls__btn--audio"
          aria-label="Reproducir audio"
        >
          <img
            class="controls__icon"
            src="img/audio.png"
            alt=""
            aria-hidden="true"
          />
        </button>
      </div>
    </main>

    <!-- ==============================
         PIE: botones de control
         (visibles solo en mobile/tablet)
    ============================== -->
    <footer class="footer">
      <div class="footer__controls">
        <a
          href="../../k3_menu.html"
          class="controls__btn controls__btn--home"
          aria-label="Ir al inicio"
        >
          <img
            class="controls__icon"
            src="img/home.png"
            alt="Inicio"
            aria-hidden="true"
          />
        </a>

        <a
          href="inicio.html"
          class="controls__btn controls__btn--back"
          aria-label="Regresar"
        >
          <img
            class="controls__icon"
            src="img/back.png"
            alt="Regreso"
            aria-hidden="true"
          />
        </a>

        <button
          class="controls__btn controls__btn--audio"
          aria-label="Reproducir audio"
        >
          <img
            class="controls__icon"
            src="img/audio.png"
            alt=""
            aria-hidden="true"
          />
        </button>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
